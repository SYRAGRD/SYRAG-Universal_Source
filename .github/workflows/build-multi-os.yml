name: Build multi-OS artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-native:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable bundle
        run: |
          pyinstaller --noconfirm --clean --windowed --name "SYRAG_universal_source_1.1" src/main.py

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf "SYRAG_universal_source_1.1-${{ runner.os }}.tar.gz" "SYRAG_universal_source_1.1"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/SYRAG_universal_source_1.1" -DestinationPath "dist/SYRAG_universal_source_1.1-Windows.zip"

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SYRAG_universal_source_1.1-${{ runner.os }}
          path: dist/SYRAG_universal_source_1.1-${{ runner.os }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SYRAG_universal_source_1.1-Windows
          path: dist/SYRAG_universal_source_1.1-Windows.zip

  build-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build AppImage
        run: |
          chmod +x build_appimage.sh release.sh
          ./release.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SYRAG_universal_source_1.1-AppImage
          path: |
            SYRAG_universal_source_1.1-x86_64.AppImage
            SYRAG_universal_source_1.1-x86_64.AppImage.sha256
