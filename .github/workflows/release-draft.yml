name: Draft release (multi-OS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag release (e.g. v1.1.0)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build-native:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app bundle
        run: |
          pyinstaller --noconfirm --clean --windowed --name "SYRAG_universal_source_1.1" src/main.py

      - name: Pack Linux/macOS artifact
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf "SYRAG_universal_source_1.1-${{ runner.os }}.tar.gz" "SYRAG_universal_source_1.1"

      - name: Pack Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/SYRAG_universal_source_1.1" -DestinationPath "dist/SYRAG_universal_source_1.1-Windows.zip"

      - name: Upload Linux/macOS artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SYRAG_universal_source_1.1-${{ runner.os }}
          path: dist/SYRAG_universal_source_1.1-${{ runner.os }}.tar.gz

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SYRAG_universal_source_1.1-Windows
          path: dist/SYRAG_universal_source_1.1-Windows.zip

  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build AppImage
        run: |
          chmod +x build_appimage.sh release.sh
          ./release.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: SYRAG_universal_source_1.1-AppImage
          path: |
            SYRAG_universal_source_1.1-x86_64.AppImage
            SYRAG_universal_source_1.1-x86_64.AppImage.sha256

  draft-release:
    name: Create draft GitHub release
    runs-on: ubuntu-latest
    needs: [build-native, build-appimage]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag_name }}" ]]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifact files
        run: |
          mkdir -p release-files
          find release-assets -type f -exec cp {} release-files/ \;
          ls -lh release-files

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: SYRAG™ universal source 1.1 — ${{ steps.tag.outputs.tag }}
          draft: true
          prerelease: false
          files: release-files/*
          body: |
            Draft release generated automatically.

            Included assets:
            - Linux AppImage
            - Linux native bundle
            - macOS native bundle
            - Windows native bundle

            Notes:
            - AppImage is Linux-only.
            - For hardened Linux distributions, use `run_appimage_compat.sh`.
